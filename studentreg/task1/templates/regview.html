<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Records</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 20px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        table {
            width: 90%;
            margin: auto;
            border-collapse: collapse;
            background-color: #ffffff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        th {
            background-color: #007bff;
            color: white;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        a {
            text-decoration: none;
            padding: 5px 10px;
            border-radius: 5px;
            color: white;
            font-size: 14px;
            margin-right: 5px;
        }

        a[href*="reg_detail"] {
            background-color: #dc3545;
        }

        a[href*="edit"] {
            background-color: #28a745;
        }

        a[href*="delete"] {
            background-color: #dc3545;
        }

        a:hover {
            opacity: 0.8;
        }

        .btn {
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 5px;
            color: white;
            font-size: 14px;
            margin-right: 5px;
            display: inline-block;
}

/* Select button */
.select-btn {
    background-color: #17a2b8;
}

    </style>
</head>
<body>
    <table border="1" cellpadding="5" cellspacing="0">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Password</th>
        <th>Email</th>
        <th>Actions</th>
    </tr>
    {% for info in all_infos %}
    <tr>
        <td>{{ forloop.counter }}
        <td>{{ info.name }}</td>
        <td>{{ info.password }}</td>
        <td>{{ info.email }}</td>
        <td>
            <a href="{% url 'reg_detail' info.id %}" class="btn select-btn">Select</a> |
            <a href="{% url 'edit' info.id %}">Update</a> |
            <a href="{% url 'deleteinfo' info.id %}" onclick="return confirm('Are you sure you want to delete this record?')">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>
<a href="{% url 'logout' %}">Logout</a>

</body>
</html>
